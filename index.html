<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proflink — Producer + Link 影视制片工作台</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app" id="app">

  <!-- ============ 侧边栏 ============ -->
  <aside class="sidebar" id="sidebar">
    <div class="sb-logo">
      <span class="sb-logo-icon">🎬</span>
      <span class="sb-logo-text">Proflink</span>
    </div>
    <nav class="sb-nav">
      <div class="sb-item active" data-tool="callsheet" onclick="switchTool('callsheet')">
        <span class="sb-icon">📋</span> 通告单
      </div>
      <div class="sb-item" data-tool="schedule" onclick="switchTool('schedule')">
        <span class="sb-icon">📊</span> 大计划
      </div>
      <div class="sb-divider">即将上线</div>
      <div class="sb-item disabled">
        <span class="sb-icon">🔍</span> 资源市场
        <span class="sb-badge">coming</span>
      </div>
      <div class="sb-item disabled">
        <span class="sb-icon">🌐</span> 交流社区
        <span class="sb-badge">coming</span>
      </div>
    </nav>
    <div class="sb-footer">
      <div class="sb-user" onclick="showToast('个人中心即将上线')">
        <span class="sb-avatar">👤</span>
        <span class="sb-username">制片人</span>
      </div>
    </div>
    <button class="sb-toggle" id="sb-toggle" onclick="toggleSidebar()">☰</button>
  </aside>

  <!-- ============ 主内容区 ============ -->
  <main class="main">

    <!-- ========== 工具1: 通告单生成器 ========== -->
    <section class="tool active" id="tool-callsheet">
      <div class="tool-header">
        <h1>📋 通告单生成器</h1>
        <p class="tool-desc">填写信息 → 一键生成专业通告单，支持导出打印</p>
      </div>

      <div class="cs-layout">
        <!-- 表单区 -->
        <div class="cs-form card">
          <h3 class="form-section-title">📌 基本信息</h3>
          <div class="form-row">
            <div class="form-group flex-2">
              <label>项目名称</label>
              <input type="text" id="cs-project" placeholder="例：《夏日蝉鸣》微电影">
            </div>
            <div class="form-group">
              <label>通告日期</label>
              <input type="date" id="cs-date">
            </div>
            <div class="form-group">
              <label>拍摄第几天</label>
              <input type="text" id="cs-day" placeholder="例：第3天/共7天">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>集合时间</label>
              <input type="time" id="cs-calltime" value="07:00">
            </div>
            <div class="form-group">
              <label>日出/日落</label>
              <input type="text" id="cs-sun" placeholder="例：日出05:30 / 日落18:45">
            </div>
            <div class="form-group">
              <label>天气</label>
              <input type="text" id="cs-weather" placeholder="例：晴 22°C">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group flex-3">
              <label>拍摄地点</label>
              <input type="text" id="cs-location" placeholder="例：北京市朝阳区XX创意园区B座3层">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group flex-3">
              <label>停车/交通备注</label>
              <input type="text" id="cs-parking" placeholder="例：园区内有停车场，地铁14号线XX站B口出">
            </div>
          </div>

          <h3 class="form-section-title">🎬 拍摄内容</h3>
          <div class="form-row">
            <div class="form-group flex-3">
              <label>拍摄场次（场景号+内容简述）</label>
              <textarea id="cs-scenes" rows="3" placeholder="例：
场1 - 卧室对话（内景）
场3 - 街道追逐（外景）
场5 - 咖啡厅相遇（内景）"></textarea>
            </div>
          </div>

          <h3 class="form-section-title">🎭 演员通告</h3>
          <div id="cs-cast-list">
            <div class="cast-row">
              <input type="text" class="cast-role" placeholder="角色">
              <input type="text" class="cast-actor" placeholder="演员名">
              <input type="text" class="cast-call" placeholder="化妆/到场时间">
              <input type="text" class="cast-scene" placeholder="拍摄场次">
              <input type="text" class="cast-remark" placeholder="备注">
              <button class="btn-icon btn-del" onclick="removeCastRow(this)" title="删除">✕</button>
            </div>
          </div>
          <button class="btn btn-outline btn-sm" onclick="addCastRow()" style="margin-top:8px;">+ 添加演员</button>

          <h3 class="form-section-title">👥 工作人员</h3>
          <div class="form-row">
            <div class="form-group flex-3">
              <label>各部门到场人员及时间</label>
              <textarea id="cs-crew" rows="3" placeholder="例：
导演组：张三 06:30
摄影组：李四、王五 06:30（携带A7S3两套）
灯光组：赵六 06:00（提前布光）
录音组：钱七 06:45
美术组：孙八 06:30（携带道具箱）
化妆组：周九 05:30
场务组：吴十 06:00"></textarea>
            </div>
          </div>

          <h3 class="form-section-title">📝 备注</h3>
          <div class="form-row">
            <div class="form-group flex-3">
              <label>特殊注意事项</label>
              <textarea id="cs-notes" rows="2" placeholder="例：今日需拍完所有内景戏；午饭后转场至公园拍外景；记得带反光板和遮光布"></textarea>
            </div>
          </div>

          <div class="form-actions">
            <button class="btn btn-primary btn-lg" onclick="generateCallSheet()">📋 生成通告单</button>
            <button class="btn btn-outline btn-lg" onclick="exportCallSheet()">🖨️ 打印 / 导出</button>
            <button class="btn btn-ghost btn-lg" onclick="saveCallSheet()">💾 保存草稿</button>
          </div>
        </div>

        <!-- 预览区 -->
        <div class="cs-preview" id="cs-preview-container">
          <div class="card cs-preview-card" id="cs-preview">
            <div class="cs-preview-empty" id="cs-preview-empty">
              <div class="empty-icon">📋</div>
              <p>填写表单后点击<br>"生成通告单"查看预览</p>
            </div>
            <div class="cs-preview-content" id="cs-preview-content" style="display:none;"></div>
          </div>
        </div>
      </div>
    </section>

    <!-- ========== 工具2: 拍摄大计划 ========== -->
    <section class="tool" id="tool-schedule">
      <div class="tool-header">
        <h1>📊 拍摄大计划</h1>
        <p class="tool-desc">可视化管理拍摄日程，拖拽排序，甘特图视图</p>
      </div>

      <div class="sch-layout">
        <!-- 场景列表 -->
        <div class="card sch-form">
          <div class="sch-form-header">
            <h3>拍摄日程表</h3>
            <button class="btn btn-primary btn-sm" onclick="addScheduleRow()">+ 添加场次</button>
          </div>
          <div class="sch-table-wrap">
            <table class="sch-table" id="sch-table">
              <thead>
                <tr>
                  <th style="width:40px;">#</th>
                  <th style="width:100px;">日期</th>
                  <th>场景/内容</th>
                  <th style="width:100px;">地点</th>
                  <th style="width:60px;">内外</th>
                  <th style="width:100px;">演员</th>
                  <th style="width:80px;">备注</th>
                  <th style="width:40px;"></th>
                </tr>
              </thead>
              <tbody id="sch-tbody"></tbody>
            </table>
          </div>
          <div class="sch-actions">
            <button class="btn btn-outline" onclick="exportSchedule()">🖨️ 打印导出</button>
            <button class="btn btn-ghost" onclick="saveSchedule()">💾 保存</button>
          </div>
        </div>

        <!-- 甘特图预览 -->
        <div class="card sch-gantt" id="sch-gantt-container">
          <div class="sch-gantt-header">
            <h3>📊 日程甘特图</h3>
          </div>
          <div class="gantt-chart" id="gantt-chart">
            <div class="gantt-empty" id="gantt-empty">
              <div class="empty-icon">📊</div>
              <p>添加场次后自动生成甘特图</p>
            </div>
          </div>
        </div>
      </div>
    </section>

  </main>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="js/app.js"></script>
</body>
</html>
